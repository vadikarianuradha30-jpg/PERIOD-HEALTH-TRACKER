<!DOCTYPE html>
<html>
<head>
    <title>Period Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> Period Health Tracker</h1>

    <div class="container">

        <input type="date" id="lastDate">

        <input type="number" id="cycle">

        <button onclick="calculate()">Predict</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
